<form class="new-message-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <label class="field">
    <span class="field-label">Phone Number</span>
    <input
      type="tel"
      class="phone-input"
      formControlName="toNumber"
      placeholder="+14155550123"
      aria-label="Phone Number"
    />
  </label>

  <label class="field">
    <span class="field-label">Message</span>
    <!--
      No native [maxlength] attribute here on purpose: the browser's
      HTMLTextAreaElement.maxLength truncates by UTF-16 code unit, which
      would silently disagree with the codepoint-based counter/validator
      below (QA report round1 N1). Length is enforced via the
      maxCodepointLength reactive-forms validator + Submit-disabled state
      instead.
    -->
    <textarea
      class="body-input"
      rows="6"
      formControlName="body"
      aria-label="Message"
    ></textarea>
  </label>
  <div class="char-counter">{{ bodyLength }}/{{ bodyMaxLength }}</div>

  @if (errorMessage) {
    <p class="error-message" role="alert">{{ errorMessage }}</p>
  }

  <div class="actions">
    <a class="clear-link" href="javascript:void(0)" (click)="onClear()">Clear</a>
    <button
      type="submit"
      class="submit-button"
      [disabled]="form.invalid || submitting"
    >
      Submit
    </button>
  </div>
</form>
